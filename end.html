<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style_header.css">
    <link rel="stylesheet" href="for_kid_2.css">
    <title>Конец</title>
</head>
<body>
    <header class="header">
        <a href="index.html">
            <img class="logo" src="logo.png" alt="Логотип">
        </a>
        <nav class="main_nav">
            <ul>
                <li><a href="about.html">О нас</a></li>
                <li><a href="forest_watch.html">Лесной дозор</a></li>
                <li><a href="for_kids.html">Детям</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="game-screen">
            <div class="game-background"></div>

            <div class="game-bar">
                <div class="character-box">
                    <div class="bar-gif">
                        <img src="soul_of_forest.gif" alt="Лесной дух">
                    </div>
                </div>

                <div class="dialog-text" id="dialogText">
                    Ну теперь ты знаешь дитя, как разнообразны леса республики нашей, и кто за них в ответе. Рассказал я тебе историю, пора и честь знать.
                </div>

                <!-- КНОПКА (добавлена) -->
                <a href="index.html" class="follow-button" id="followButton">
                    Выйти из леса →
                </a>
            </div>
        </section>
    </main>

    <script>
        const allPhrases = [
            "Ну теперь ты знаешь дитя, как разнообразны леса республики нашей, и кто за них в ответе. Рассказал я тебе историю, пора и честь знать.",
            "Ты уже уходишь? ",
            "Всему свойственно заканчиваться, и наша встреча не исключение, прощай.",
            "cтраж, страж, страж, страж, страж.",
            "Что?",
            "2 часть. Ключ. Ответ."
        ];

        const speakers = [
            "дух", "игрок", "дух", "дух", "игрок", "дух"
        ];

        let currentIndex = 0;
        const dialogText = document.getElementById('dialogText');
        const followButton = document.getElementById('followButton');


        function showNextPhrase() {
    if (currentIndex < allPhrases.length - 1) {
        currentIndex++;
        dialogText.textContent = allPhrases[currentIndex];

        if (speakers[currentIndex] === "дух") {
            dialogText.classList.remove('player-text');
        } else {
            dialogText.classList.add('player-text');
        }

        // Убираем специальный класс по умолчанию
        dialogText.classList.remove('special-phrase');

        // Добавляем специальный класс для нужных фраз
        if (allPhrases[currentIndex] === "Страж, страж, страж, страж, страж." ||
            allPhrases[currentIndex] === "2 часть. Ключ. Ответ.") {
            dialogText.classList.add('special-phrase');
        }
    }

    if (currentIndex === allPhrases.length - 1) {
        followButton.style.display = 'inline-block';
    }
}

        dialogText.addEventListener('click', showNextPhrase);
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') showNextPhrase();
        });
    </script>
</body>
</html>
