<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="secret.css">
    <title>???</title>
</head>
<body>

    <main>
        <section class="game-screen">
            <div class="game-background"></div>

            <div class="game-bar">

                <div class="dialog-text" id="dialogText">
                    Приветик! Это снова я! Вижу ты всё-таки посмотрел вкладку "Лесной дозор". Ура-ура!!!.
                </div>

                <!-- КНОПКА (добавлена) -->
                <a href="https://rutube.ru/video/f3b615db135287a64584737e664e1e4b/" class="follow-button" id="followButton">
                    Нажми меня)
                </a>
            </div>
        </section>
    </main>

    <script>
        const allPhrases = [
            "Приветик! Это снова я! Вижу ты всё-таки посмотрел вкладку \"Лесной дозор\". Ура-ура!!!.",
            "Я знаю, тебе интересно узнать кто я, и зачем ты искал(а) части ключа. Нажми кнопку и ты всё узнаешь!!"

        ];

        const speakers = [
            "дух","дух"
        ];

        let currentIndex = 0;
        const dialogText = document.getElementById('dialogText');
        const followButton = document.getElementById('followButton');

        function showNextPhrase() {
            if (currentIndex < allPhrases.length - 1) {
                currentIndex++;
                dialogText.textContent = allPhrases[currentIndex];

                if (speakers[currentIndex] === "дух") {
                    dialogText.classList.remove('player-text');
                } else {
                    dialogText.classList.add('player-text');
                }
            }

            if (currentIndex === allPhrases.length - 1) {
                followButton.style.display = 'inline-block';
            }
        }

        dialogText.addEventListener('click', showNextPhrase);
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') showNextPhrase();
        });
    </script>
</body>
</html>
